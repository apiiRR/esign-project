<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#047857" />
    <title>Offline - SADIKA</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f4f6;
        color: #111827;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid #d1d5db;
        border-radius: 12px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      .mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: #047857;
        color: #ffffff;
        font-weight: 800;
      }
      h1 {
        margin: 20px 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #4b5563;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">SDK</div>
      <h1>Aplikasi sedang offline</h1>
      <p>Data surat memerlukan koneksi internet agar tetap aman dan terbaru. Periksa koneksi, lalu muat ulang halaman.</p>
    </main>
  </body>
</html>
